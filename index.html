<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Eva Milaf Attendance</title>
    <!-- Libraries -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #fff5e6 0%, #ffe6d5 100%);
            padding: 24px 20px;
            min-height: 100vh;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            padding: 24px 28px;
            margin-bottom: 28px;
            transition: all 0.2s;
            border: 1px solid rgba(249,115,22,0.2);
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
        }
        button, .btn {
            background: #f97316;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        button:hover {
            background: #ea580c;
            transform: scale(0.97);
        }
        .btn-outline {
            background: white;
            border: 1.5px solid #f97316;
            color: #f97316;
        }
        .btn-outline:hover {
            background: #fff0e6;
        }
        .btn-danger {
            background: #dc2626;
        }
        .btn-success {
            background: #10b981;
        }
        .btn-ocean {
            background: #0ea5e9;
        }
        input, select {
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px solid #fed7aa;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
            transition: 0.2s;
            background: white;
        }
        input:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 2px rgba(249,115,22,0.2);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 0.85rem;
        }
        th, td {
            text-align: left;
            padding: 12px 8px;
            border-bottom: 1px solid #ffedd5;
        }
        th {
            background: #fff7ed;
            font-weight: 600;
            color: #9a3412;
        }
        .badge {
            background: #d1fae5;
            color: #065f46;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-warning {
            background: #fff1e0;
            color: #c2410c;
        }
        .qr-box {
            background: #ffffff;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            border: 1px solid #ffedd5;
        }
        #qrcode canvas, #qrcode img {
            margin: 0 auto;
            border-radius: 20px;
            background: white;
            padding: 12px;
        }
        .scanner-area {
            background: #fef9f1;
            border-radius: 32px;
            padding: 20px;
            border: 1px solid #fed7aa;
        }
        .status-msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 40px;
            background: #fef3e8;
            border-left: 6px solid #f97316;
        }
        .export-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 20px 0 12px;
        }
        h2 {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #9a3412;
        }
        h3 {
            font-weight: 600;
            margin: 16px 0 8px;
            color: #c2410c;
        }
        hr {
            margin: 16px 0;
            border-color: #fed7aa;
        }
        .login-panel {
            max-width: 460px;
            margin: 80px auto;
        }
        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            color: #92400e;
            margin-top: 30px;
        }
        .logo-placeholder {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            background: linear-gradient(135deg, #f97316, #0ea5e9);
            width: 48px;
            height: 48px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.6rem;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        .lang-switch {
            background: #fef3e8;
            border: 1px solid #f97316;
            border-radius: 40px;
            padding: 6px 12px;
            display: flex;
            gap: 8px;
        }
        .lang-btn {
            background: transparent;
            color: #9a3412;
            box-shadow: none;
            padding: 4px 12px;
            font-size: 0.8rem;
        }
        .lang-btn.active {
            background: #f97316;
            color: white;
        }
        @media (max-width: 780px) {
            .grid-2col { grid-template-columns: 1fr; }
            .card { padding: 18px; }
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot"></div>

<script>
    // ---------- LANGUAGES (FR / AR) ----------
    let currentLang = 'fr';
    const translations = {
        fr: {
            app_name: "Eva Milaf Attendance",
            login_title: "Connexion",
            username: "Nom d'utilisateur",
            password: "Mot de passe",
            login_btn: "Se connecter →",

            agency_dash: "Tableau de bord Agence",

            status_ready: "Prêt à scanner...",

            my_history: "📅 Mon historique de présence",
            checkin_success: "✅ Pointage enregistré !",
            checkin_fail: "⛔ Échec du pointage",
            already_checked: "⚠️ Vous avez déjà pointé aujourd'hui.",
            outside_hours: "❌ Pointage autorisé uniquement Sam–Jeu entre 9h et 17h.",
            friday_closed: "❌ Vendredi fermé. Aucun pointage.",
            invalid_qr: "❌ QR invalide. Scannez le QR officiel de l'agence.",
            camera_error: "⚠️ Accès caméra refusé ou non supporté.",
            welcome_trainee: "Bienvenue",
            no_records: "Aucun enregistrement",
            present: "✓ présent",
            absent: "absent",
            close: "Fermé",
            open: "Ouvert",
            status_open: "🟢 Agence OUVERTE — vous pouvez scanner",
            status_closed: "🔴 Fermé ou hors horaire",
            not_checked: "⚠️ Non pointé aujourd'hui",
            checked_today: "✅ Pointé aujourd'hui",
            add_success: "Stagiaire ajouté avec succès !",
            user_exists: "Nom d'utilisateur déjà existant",
            fill_fields: "Tous les champs sont requis",
            export_error: "Erreur d'export",
            loading: "Chargement...",
            agency_creds: "Identifiants agence : evamilaf / evamilaf1234"
        },
        ar: {
            app_name: "حضور إيفا ميلاف",
            login_title: "تسجيل الدخول",
            username: "اسم المستخدم",
            password: "كلمة المرور",
            login_btn: "دخول ←",
            logout: "تسجيل الخروج",
            agency_dash: "لوحة تحكم الوكالة",
            qr_title: "📱 رمز QR للمتدربين",
            qr_desc: "ضع هذا الرمز عند مدخل الوكالة. يقوم المتدربون بمسحه لتسجيل الحضور.",
            working_hours: "⏰ ساعات العمل: السبت–الخميس، 9:00 – 17:00 (الجمعة عطلة)",
            add_trainee: "➕ إضافة متدرب",
            trainee_name: "الاسم الكامل",
            trainee_user: "اسم المستخدم",
            trainee_pwd: "كلمة المرور",
            create_btn: "إنشاء",
            recent_attendance: "📊 سجل الحضور الأخير",
            export_section: "📁 تصدير البيانات",
            export_json: "📄 تصدير JSON",
            export_pdf: "📑 تصدير PDF",
            export_doc: "📝 تصدير DOC",
            absence_summary: "📋 الغيابات (آخر 7 أيام عمل)",
            trainee_dash: "مساحة المتدرب",
            scan_qr: "📸 مسح رمز QR",
            scan_instruction: "ضع الكاميرا أمام رمز QR الخاص بالوكالة → تسجيل الحضور تلقائيًا",
            status_ready: "جاهز للمسح...",
            status_today: "حالة اليوم",
            my_history: "📅 سجل حضوري",
            checkin_success: "✅ تم تسجيل الحضور!",
            checkin_fail: "⛔ فشل تسجيل الحضور",
            already_checked: "⚠️ لقد سجلت حضورك بالفعل اليوم.",
            outside_hours: "❌ التسجيل مسموح فقط السبت–الخميس بين 9 و17.",
            friday_closed: "❌ الجمعة عطلة. لا تسجيل حضور.",
            invalid_qr: "❌ رمز QR غير صالح. استخدم رمز الوكالة الرسمي.",
            camera_error: "⚠️ تعذر الوصول إلى الكاميرا أو غير مدعوم.",
            welcome_trainee: "مرحباً",
            no_records: "لا توجد سجلات",
            present: "✓ حاضر",
            absent: "غائب",
            close: "مغلق",
            open: "مفتوح",
            status_open: "🟢 الوكالة مفتوحة — يمكنك المسح",
            status_closed: "🔴 مغلق أو خارج ساعات العمل",
            not_checked: "⚠️ لم تسجل حضور اليوم",
            checked_today: "✅ سجلت حضور اليوم",
            add_success: "تمت إضافة المتدرب بنجاح!",
            user_exists: "اسم المستخدم موجود بالفعل",
            fill_fields: "جميع الحقول مطلوبة",
            export_error: "خطأ في التصدير",
            loading: "جار التحميل...",
            agency_creds: "بيانات تسجيل الدخول للوكالة: evamilaf / evamilaf1234"
        }
    };
    function t(key) { return translations[currentLang][key] || key; }

    // ---------- CONSTANTS ----------
    const STORAGE_USERS = "travel_agency_users";
    const STORAGE_ATTENDANCE = "travel_attendance_records";
    const QR_SECRET = "EVA_MILAF_ATTENDANCE_2025";
    const WORK_START_HOUR = 9;
    const WORK_END_HOUR = 17;
    const WORKING_DAYS = [6, 0, 1, 2, 3, 4]; // samedi à jeudi

    // ---------- HELPERS ----------
    function isWorkingDayAndTime() {
        const now = new Date();
        const day = now.getDay();
        if (!WORKING_DAYS.includes(day)) return false;
        const hour = now.getHours();
        return (hour >= WORK_START_HOUR && hour < WORK_END_HOUR);
    }
    function getTodayDateStr() { return new Date().toISOString().slice(0,10); }
    function getCurrentTimeStr() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
    function hasCheckedToday(traineeId) {
        const records = loadAttendance();
        const today = getTodayDateStr();
        return records.some(rec => rec.traineeId === traineeId && rec.date === today);
    }

    // Improved user loading: ensures agency user exists with correct credentials
    function loadUsers() {
        let users = localStorage.getItem(STORAGE_USERS);
        if (!users) {
            users = [
                { id: "agency_main", username: "evamilaf", password: "evamilaf1234", role: "agency", displayName: "Eva Milaf Admin" },
                { id: "trainee_def1", username: "yassine.att", password: "pass123", role: "trainee", displayName: "Yassine Benali" },
                { id: "trainee_def2", username: "leila.mans", password: "pass123", role: "trainee", displayName: "Leila Mansouri" }
            ];
            localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
            return users;
        }
        users = JSON.parse(users);
        // Ensure agency user exists with correct password
        const agencyExists = users.find(u => u.role === "agency" && u.username === "evamilaf");
        if (!agencyExists) {
            // Remove any other agency if present (to avoid conflict)
            const filtered = users.filter(u => u.role !== "agency");
            filtered.push({ id: "agency_main", username: "evamilaf", password: "evamilaf1234", role: "agency", displayName: "Eva Milaf Admin" });
            users = filtered;
            localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
        } else if (agencyExists.password !== "evamilaf1234") {
            // Update password if different
            agencyExists.password = "evamilaf1234";
            localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
        }
        // Ensure there is at least one trainee for demo
        const trainees = users.filter(u => u.role === "trainee");
        if (trainees.length === 0) {
            users.push(
                { id: "trainee_def1", username: "yassine.att", password: "pass123", role: "trainee", displayName: "Yassine Benali" },
                { id: "trainee_def2", username: "leila.mans", password: "pass123", role: "trainee", displayName: "Leila Mansouri" }
            );
            localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
        }
        return users;
    }

    function loadAttendance() {
        const raw = localStorage.getItem(STORAGE_ATTENDANCE);
        return raw ? JSON.parse(raw) : [];
    }
    function saveAttendance(att) { localStorage.setItem(STORAGE_ATTENDANCE, JSON.stringify(att)); }
    function saveUsers(users) { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }

    function registerCheckin(traineeId, traineeName) {
        if (!isWorkingDayAndTime()) return { success: false, msg: t('outside_hours') };
        const day = new Date().getDay();
        if (day === 5) return { success: false, msg: t('friday_closed') };
        if (hasCheckedToday(traineeId)) return { success: false, msg: t('already_checked') };
        const att = loadAttendance();
        const newRecord = {
            id: Date.now(),
            traineeId, traineeName,
            date: getTodayDateStr(),
            checkinTime: getCurrentTimeStr(),
            timestamp: new Date().toISOString()
        };
        att.push(newRecord);
        saveAttendance(att);
        return { success: true, msg: `${t('checkin_success')} ${getTodayDateStr()} à ${newRecord.checkinTime}` };
    }

    // ---------- AUTH ----------
    let currentUser = null;
    function saveSession(user) { sessionStorage.setItem("agency_session", JSON.stringify(user)); currentUser = user; }
    function clearSession() { sessionStorage.removeItem("agency_session"); currentUser = null; }
    function loadSession() {
        const sess = sessionStorage.getItem("agency_session");
        currentUser = sess ? JSON.parse(sess) : null;
        return currentUser;
    }

    // ---------- UI RENDER ----------
    let qrScannerInstance = null;
    function stopScanner() {
        if (qrScannerInstance) { try { qrScannerInstance.clear(); } catch(e){} qrScannerInstance = null; }
        const div = document.getElementById("qr-reader");
        if (div) div.innerHTML = "";
    }

    function renderApp() {
        const root = document.getElementById("appRoot");
        if (!currentUser) {
            root.innerHTML = renderLogin();
            attachLoginEvents();
            return;
        }
        if (currentUser.role === "agency") {
            root.innerHTML = renderAgency();
            attachAgencyEvents();
            generateQR();
        } else {
            root.innerHTML = renderTrainee();
            attachTraineeEvents();
            initTraineeScanner();
        }
    }

    // ----- LOGIN -----
    function renderLogin() {
        return `
            <div class="login-panel card">
                <div class="logo-placeholder" style="justify-content:center; margin-bottom:20px;">
                    <div class="logo-icon">EM</div>
                    <h2 style="margin:0;">${t('app_name')}</h2>
                </div>
                <div style="display:flex; flex-direction:column; gap:16px;">
                    <input type="text" id="loginUsername" placeholder="${t('username')}" autocomplete="off">
                    <input type="password" id="loginPassword" placeholder="${t('password')}">
                    <button id="loginBtn" class="btn">${t('login_btn')}</button>
                    <div class="status-msg" style="font-size:0.75rem; text-align:center;">${t('agency_creds')}</div>
                    <div class="lang-switch" style="justify-content:center; margin-top:12px;">
                        <button class="lang-btn ${currentLang === 'fr' ? 'active' : ''}" data-lang="fr">Français</button>
                        <button class="lang-btn ${currentLang === 'ar' ? 'active' : ''}" data-lang="ar">العربية</button>
                    </div>
                </div>
            </div>
        `;
    }
    function attachLoginEvents() {
        const loginBtn = document.getElementById("loginBtn");
        if (loginBtn) {
            loginBtn.addEventListener("click", () => {
                const username = document.getElementById("loginUsername").value.trim();
                const pwd = document.getElementById("loginPassword").value;
                const users = loadUsers();
                const user = users.find(u => u.username === username && u.password === pwd);
                if (user) {
                    saveSession(user);
                    renderApp();
                } else {
                    alert("Identifiants incorrects / بيانات دخول خاطئة");
                }
            });
        }
        // language switcher inside login
        document.querySelectorAll(".lang-btn").forEach(btn => {
            btn.removeEventListener("click", langHandler);
            btn.addEventListener("click", langHandler);
        });
        function langHandler(e) {
            currentLang = e.currentTarget.getAttribute("data-lang");
            renderApp();
        }
    }

    // ----- AGENCY DASHBOARD -----
    function renderAgency() {
        const attendance = loadAttendance();
        const users = loadUsers();
        const trainees = users.filter(u => u.role === "trainee");
        let rows = "";
        if (attendance.length === 0) rows = `<tr><td colspan="4" style="text-align:center;">${t('no_records')}</td></tr>`;
        else {
            [...attendance].sort((a,b)=> new Date(b.date)-new Date(a.date)).forEach(rec => {
                rows += `<tr><td>${escapeHtml(rec.traineeName)}</td><td>${rec.date}</td><td>${rec.checkinTime}</td><td><span class="badge">${t('present')}</span></td></tr>`;
            });
        }
        const summary = generateAbsenceSummary(trainees, attendance);
        let summaryHtml = `<div style="display:flex; flex-wrap:wrap; gap:12px; margin-top:8px;">`;
        summary.forEach(s => { summaryHtml += `<span style="background:#fef3c7; border-radius:40px; padding:4px 12px;">👤 ${s.name} : ${s.absentDays} ${t('absent')}</span>`; });
        summaryHtml += `</div>`;

        return `
            <div class="flex-row">
                <div class="logo-placeholder"><div class="logo-icon">EM</div><h2>${t('agency_dash')}</h2></div>
                <div style="display:flex; gap:12px;"><div class="lang-switch"><button class="lang-btn ${currentLang === 'fr' ? 'active' : ''}" data-lang="fr">FR</button><button class="lang-btn ${currentLang === 'ar' ? 'active' : ''}" data-lang="ar">AR</button></div><button id="logoutBtn" class="btn-outline">${t('logout')}</button></div>
            </div>
            <div class="grid-2col">
                <div class="card">
                    <h3>${t('qr_title')}</h3>
                    <p>${t('qr_desc')}</p>
                    <div class="qr-box"><div id="qrcode"></div><p style="margin-top:10px; font-size:12px;">${QR_SECRET}</p></div>
                    <div class="status-msg">${t('working_hours')}</div>
                </div>
                <div class="card">
                    <h3>${t('add_trainee')}</h3>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                        <input type="text" id="newTraineeName" placeholder="${t('trainee_name')}" style="flex:2">
                        <input type="text" id="newTraineeUsername" placeholder="${t('trainee_user')}" style="flex:2">
                        <input type="text" id="newTraineePwd" placeholder="${t('trainee_pwd')}" style="flex:1">
                        <button id="addTraineeBtn" class="btn-success">${t('create_btn')}</button>
                    </div>
                    <hr>
                    <h3>${t('recent_attendance')}</h3>
                    <div style="overflow-x:auto;"><table><thead><tr><th>${t('trainee_name')}</th><th>Date</th><th>Heure</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div>
                </div>
            </div>
            <div class="card">
                <h3>${t('export_section')}</h3>
                <div class="export-bar">
                    <button id="exportJSONBtn" class="btn-ocean">${t('export_json')}</button>
                    <button id="exportPDFBtn" class="btn-ocean">${t('export_pdf')}</button>
                    <button id="exportDOCBtn" class="btn-ocean">${t('export_doc')}</button>
                </div>
                <div><strong>${t('absence_summary')}</strong> ${summaryHtml}</div>
            </div>
        `;
    }
    function generateAbsenceSummary(trainees, attendance) {
        const last7Days = [];
        for (let i = 0; i < 14; i++) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            if (WORKING_DAYS.includes(d.getDay())) {
                last7Days.push(d.toISOString().slice(0,10));
                if (last7Days.length === 7) break;
            }
        }
        return trainees.map(t => {
            let present = attendance.filter(rec => rec.traineeId === t.id && last7Days.includes(rec.date)).length;
            return { name: t.displayName, absentDays: last7Days.length - present };
        });
    }
    function attachAgencyEvents() {
        document.getElementById("logoutBtn")?.addEventListener("click", () => { clearSession(); stopScanner(); renderApp(); });
        document.getElementById("addTraineeBtn")?.addEventListener("click", () => {
            const name = document.getElementById("newTraineeName").value.trim();
            const uname = document.getElementById("newTraineeUsername").value.trim();
            const pwd = document.getElementById("newTraineePwd").value.trim();
            if (!name || !uname || !pwd) { alert(t('fill_fields')); return; }
            const users = loadUsers();
            if (users.find(u => u.username === uname)) { alert(t('user_exists')); return; }
            users.push({ id: "u"+Date.now(), username: uname, password: pwd, role: "trainee", displayName: name });
            saveUsers(users);
            alert(t('add_success'));
            renderApp();
        });
        document.getElementById("exportJSONBtn")?.addEventListener("click", exportJSON);
        document.getElementById("exportPDFBtn")?.addEventListener("click", exportPDF);
        document.getElementById("exportDOCBtn")?.addEventListener("click", exportDOC);
        // language switcher in agency view
        document.querySelectorAll(".lang-btn").forEach(btn => {
            btn.removeEventListener("click", langHandler);
            btn.addEventListener("click", langHandler);
        });
        function langHandler(e) {
            currentLang = e.currentTarget.getAttribute("data-lang");
            renderApp();
        }
    }
    function generateQR() {
        const container = document.getElementById("qrcode");
        if (container) { container.innerHTML = ""; new QRCode(container, { text: QR_SECRET, width: 160, height: 160, colorDark: "#f97316", colorLight: "#ffffff" }); }
    }

    // ----- TRAINEE DASHBOARD -----
    function renderTrainee() {
        const attendance = loadAttendance();
        const myRecords = attendance.filter(r => r.traineeId === currentUser.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
        let historyRows = myRecords.length ? myRecords.map(r => `<tr><td>${r.date}</td><td>${r.checkinTime}</td><td><span class="badge">${t('present')}</span></td></tr>`).join('') : `<tr><td colspan="3">${t('no_records')}</td></tr>`;
        const checkedToday = hasCheckedToday(currentUser.id);
        const workingNow = isWorkingDayAndTime() && (new Date().getDay() !== 5);
        return `
            <div class="flex-row">
                <div class="logo-placeholder"><div class="logo-icon">EM</div><h2>${t('trainee_dash')}</h2></div>
                <div style="display:flex; gap:12px;"><div class="lang-switch"><button class="lang-btn ${currentLang === 'fr' ? 'active' : ''}" data-lang="fr">FR</button><button class="lang-btn ${currentLang === 'ar' ? 'active' : ''}" data-lang="ar">AR</button></div><button id="logoutBtnTrainee" class="btn-outline">${t('logout')}</button></div>
            </div>
            <div class="grid-2col">
                <div class="scanner-area">
                    <h3>${t('scan_qr')}</h3>
                    <p>${t('scan_instruction')}</p>
                    <div id="qr-reader" style="width:100%; max-width:500px; border-radius: 24px; overflow:hidden;"></div>
                    <div id="scanResultMsg" class="status-msg">${t('status_ready')}</div>
                    <div class="status-msg"><strong>${t('status_today')}:</strong> ${checkedToday ? t('checked_today') : t('not_checked')}<br>${workingNow ? t('status_open') : t('status_closed')}</div>
                </div>
                <div class="card">
                    <h3>${t('my_history')}</h3>
                    <div style="overflow-x:auto;"><table><thead><tr><th>Date</th><th>Heure</th><th>Status</th></tr></thead><tbody>${historyRows}</tbody></table></div>
                </div>
            </div>
        `;
    }
    function attachTraineeEvents() {
        document.getElementById("logoutBtnTrainee")?.addEventListener("click", () => { clearSession(); stopScanner(); renderApp(); });
        document.querySelectorAll(".lang-btn").forEach(btn => {
            btn.removeEventListener("click", langHandler);
            btn.addEventListener("click", langHandler);
        });
        function langHandler(e) {
            currentLang = e.currentTarget.getAttribute("data-lang");
            renderApp();
        }
    }
    function initTraineeScanner() {
        stopScanner();
        const div = document.getElementById("qr-reader");
        if (!div) return;
        const html5QrCode = new Html5Qrcode("qr-reader");
        qrScannerInstance = html5QrCode;
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
            (decoded) => {
                if (decoded === QR_SECRET) {
                    const res = registerCheckin(currentUser.id, currentUser.displayName);
                    const msgDiv = document.getElementById("scanResultMsg");
                    if (msgDiv) msgDiv.innerHTML = res.success ? `<span style="color:#10b981;">${res.msg}</span>` : `<span style="color:#dc2626;">${res.msg}</span>`;
                    if (res.success) setTimeout(() => renderApp(), 1200);
                } else {
                    document.getElementById("scanResultMsg").innerHTML = `<span style="color:#dc2626;">${t('invalid_qr')}</span>`;
                }
            },
            (err) => {}
        ).catch(() => { document.getElementById("scanResultMsg").innerHTML = `<span style="color:#dc2626;">${t('camera_error')}</span>`; });
    }

    // ---------- EXPORT ----------
    function getAllData() {
        const att = loadAttendance();
        const users = loadUsers();
        return att.map(a => ({ trainee_name: users.find(u=>u.id===a.traineeId)?.displayName || a.traineeName, date: a.date, checkin_time: a.checkinTime }));
    }
    function exportJSON() { const data = getAllData(); const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `attendance_${getTodayDateStr()}.json`; a.click(); URL.revokeObjectURL(a.href); }
    function exportPDF() {
        const data = getAllData(); const wrapper = document.createElement("div"); wrapper.style.padding="20px"; wrapper.innerHTML = `<h2>${t('app_name')}</h2><p>${new Date().toLocaleString()}</p><table border="1" cellpadding="5"><tr><th>${t('trainee_name')}</th><th>Date</th><th>Heure</th></tr>${data.map(d=>`<tr><td>${escapeHtml(d.trainee_name)}</td><td>${d.date}</td><td>${d.checkin_time}</td></tr>`).join('')}</table>`;
        document.body.appendChild(wrapper); html2pdf().from(wrapper).set({ margin:0.5, filename:`attendance_${getTodayDateStr()}.pdf` }).save().then(()=>wrapper.remove()).catch(()=>wrapper.remove());
    }
    function exportDOC() {
        const data = getAllData(); const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${t('app_name')}</title></head><body><h2>${t('app_name')}</h2><p>${new Date().toLocaleString()}</p><table border="1"><tr><th>${t('trainee_name')}</th><th>Date</th><th>Heure</th></tr>${data.map(d=>`<tr><td>${escapeHtml(d.trainee_name)}</td><td>${d.date}</td><td>${d.checkin_time}</td></tr>`).join('')}</table></body></html>`;
        const blob = new Blob([html], {type:"application/msword"}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `attendance_${getTodayDateStr()}.doc`; a.click(); URL.revokeObjectURL(a.href);
    }
    function escapeHtml(s) { if(!s) return ""; return s.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // INIT
    loadSession();
    renderApp();
</script>
</body>
</html>
